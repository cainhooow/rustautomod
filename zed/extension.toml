id = "rust-automod"
name = "Rust AutoMod"
version = "0.4.7"
schema_version = 1
description = "Rust AutoMod for Zed, with .rautomod editor support, diagnostics, formatting, completions, hover help, Rust code actions for module registration, a Rust daemon watcher for safe module-target sync, and slash commands for scaffold, audit, explain, and module-pair creation."
repository = "https://github.com/cainhooow/rustautomod"
authors = ["Cainhooow - Caio Augusto"]
languages = ["languages/rautomod"]
themes = []
icon_themes = []

[lib]
kind = "Rust"
version = "0.7.0"

[[capabilities]]
kind = "process:exec"
command = "*"
args = ["**"]

[grammars.toml]
repository = "https://github.com/tree-sitter/tree-sitter-toml"
rev = "342d9be207c2dba869b9967124c679b5e6fd0ebe"

[language_servers]

[language_servers.rautomod-language-server]
name = "Rust AutoMod Language Server"
language = "Rust AutoMod"

[language_servers.rustautomod-rust-actions]
name = "Rust AutoMod Rust Actions"
language = "Rust"

[context_servers]

[agent_servers]

[slash_commands.rautomod-help]
description = "Show the current Rust AutoMod for Zed capabilities and usage hints"
requires_argument = false

[slash_commands.rautomod-scaffold]
description = "Create a starter .rautomod in the worktree root or a relative directory"
requires_argument = false

[slash_commands.rautomod-format]
description = "Format a .rautomod file in place. Argument: relative path to the file"
requires_argument = true

[slash_commands.rautomod-audit]
description = "Audit a .rautomod file and show diagnostics. Argument optional: relative path"
requires_argument = false

[slash_commands.rautomod-explain]
description = "Explain which .rautomod rule wins for a Rust file. Argument: relative path"
requires_argument = true

[slash_commands.rautomod-create-pair]
description = "Create a Rust module pair. Args: <directory> <module> [visibility] [layout]"
requires_argument = true
