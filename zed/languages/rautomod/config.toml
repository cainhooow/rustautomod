name = "Rust AutoMod"
grammar = "toml"
path_suffixes = ["rautomod", ".rautomod"]
line_comments = ["# "]
autoclose_before = ",]}"
brackets = [
    { start = "\"", end = "\"", close = true, newline = false, not_in = ["comment", "string"] },
    { start = "'", end = "'", close = true, newline = false, not_in = ["comment", "string"] },
    { start = "(", end = ")", close = true, newline = false, not_in = ["comment", "string"] },
]
